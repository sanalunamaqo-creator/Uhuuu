<!DOCTYPE html>
<html>
<head>
  <title>For my babyy 💖</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      overflow: hidden;
    }

    .box {
      margin-top: 100px;
    }

    .pin-display {
      font-size: 35px;
      letter-spacing: 10px;
      margin: 20px;
    }

    .keypad button {
      width: 70px;
      height: 70px;
      margin: 10px;
      font-size: 20px;
      border-radius: 50%;
      border: none;
      background: pink;
      color: white;
    }

    button {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      background: #ff6b81;
      color: white;
      cursor: pointer;
    }

    #typingText {
      white-space: pre-line;
      font-size: 20px;
      margin: 20px;
      line-height: 1.6;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<!-- 🎶 MUSIK -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- PAGE 1 -->
<div class="box" id="page1">
  <h2>Masukin kode ya ayangg 💖</h2>

  <img src="ee8b602fea5642054eece377cd1b551c.gif" width="180"><br>

  <div class="pin-display" id="display">____</div>

  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button><br>

    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button><br>

    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button><br>

    <button onclick="resetPin()">❌</button>
    <button onclick="press(0)">0</button>
    <button onclick="checkPin()">✔️</button>
  </div>

  <p id="error"></p>
</div>

<!-- PAGE 2 -->
<div class="box" id="page2" style="display:none;">
  <h2>Mau lanjut buka nggak? 💖</h2>

  <img src="48d63d7d9037071b11d3c1eff21e3c85.gif" width="180"><br>

  <button onclick="no()">Nggak 😢</button>
  <button onclick="yes()">Buka 💕</button>
</div>

<!-- NO PAGE -->
<div class="box" id="noPage" style="display:none;">
  <h2>Yahh jahat 😭</h2>

  <img src="124cca4c2f251cc70a7e886e6318aa5c.gif" width="180"><br>

  <p>Aku sedih tauu 🥺</p>
  <button onclick="tryAgain()">Coba lagi 💕</button>
</div>

<!-- FINAL -->
<div class="box" id="final" style="display:none;">
  <h1>Happy Birthday 💖</h1>

  <img src="c7339a531d54a28dddec8183397601d2.gif" width="200"><br>

  <p id="typingText"></p>
</div>

<script>
let pin = "";
let i = 0;

const text = `Happy birthday ayangg 🎂💖

Walaupun kita lagi jauh sekarang…
aku tetep ngerasa kamu deket 🥺

Aku kangen kamu,
kangen semua hal kecil tentang kamu...

Kadang emang berat ya…
ga bisa ketemu, ga bisa peluk kamu langsung

tapi aku yakin…
semua ini bakal indah pada waktunya 🥹

Tunggu aku ya…
kita pasti bakal ketemu 💕

ini peluk virtual dari aku 🫂💖

I love you 🤍`;

function press(num) {
  if (pin.length < 4) {
    pin += num;
    document.getElementById("display").innerText = pin.padEnd(4, "_");
  }
}

function resetPin() {
  pin = "";
  document.getElementById("display").innerText = "____";
}

function checkPin() {
  if (pin === "0802") {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Salah ayangg 😭";
    resetPin();
  }
}

function no() {
  document.getElementById("page2").style.display = "none";
  document.getElementById("noPage").style.display = "block";
}

function tryAgain() {
  document.getElementById("noPage").style.display = "none";
  document.getElementById("page2").style.display = "block";
}

function yes() {
  document.getElementById("page2").style.display = "none";
  document.getElementById("final").style.display = "block";
  typeWriter();
}

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typingText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

// 💖 LOVE JATUH
function createHeart() {
  const heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "fixed";
  heart.style.top = "-10px";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.fontSize = "20px";
  heart.style.animation = "fall 5s linear";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
